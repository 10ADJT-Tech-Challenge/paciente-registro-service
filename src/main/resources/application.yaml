server:
  port: 8081 # trocar por property de ambiente

spring:
  application:
    name: paciente-registro-service

  datasource:
    url: jdbc:postgresql://${DB_HOST_PACIENTE_REGISTRO:localhost}:${DB_PORT_PACIENTE_REGISTRO:5432}/${DB_NAME_PACIENTE_REGISTRO:paciente-registro-service}
    username: ${DB_USER_PACIENTE_REGISTRO:postgres}
    password: ${DB_PASSWORD_PACIENTE_REGISTRO:senha_padrao}
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASSWORD:secret}

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:/db/migration

  jpa:
    hibernate:
      ddl-auto: none

springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /v1/swagger-ui.html
    url: /paciente-registro-service.yaml

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [traceId=%X{traceId}] - %msg%n"
  level:
    com:
      adjt:
        pacienteregistroservice: INFO