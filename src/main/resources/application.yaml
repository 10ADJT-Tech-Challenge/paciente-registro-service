spring:
  application:
    name: paciente-registro-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paciente-registro-service}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:senha_padrao}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:/db/migration

  jpa:
    hibernate:
      ddl-auto: none